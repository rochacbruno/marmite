name: GH Pages Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v7

      - name: Check Rust version consistency
        run: |
          TOOLCHAIN_VER=$(grep '^channel' rust-toolchain.toml | sed 's/.*"\(.*\)"/\1/')
          MISE_VER=$(grep '^rust' mise.toml | sed 's/.*"\(.*\)"/\1/')
          echo "rust-toolchain.toml: $TOOLCHAIN_VER"
          echo "mise.toml: $MISE_VER"
          if [ "$TOOLCHAIN_VER" != "$MISE_VER" ]; then
            echo "::error::Rust version mismatch: rust-toolchain.toml ($TOOLCHAIN_VER) != mise.toml ($MISE_VER)"
            exit 1
          fi

      - name: check formatting 🖌️
        run: cargo fmt -- --check

      - name: Cache Cargo dependencies 📦
        uses: Swatinem/rust-cache@v2

      - name: Clippy 📎
        # Relaxed on clippy requirement, will run it manually from time to time.
        # run: cargo clippy -- -W clippy::pedantic
        run: cargo clippy

      - name: Test 🧪
        run: cargo test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout 🛎
        uses: actions/checkout@v7

      - name: Check if release version 🏷️
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION"
          if echo "$VERSION" | grep -q -- '-dev'; then
            echo "is_release=false" >> $GITHUB_OUTPUT
          else
            echo "is_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Cache Cargo dependencies 📦
        uses: Swatinem/rust-cache@v2

      - name: Build 🔧
        run: cargo build --release

      - name: Add paths 📂
        run: echo "::add-path::$GITHUB_WORKSPACE/target/release"

      - name: Prepare site 🏗️
        run: .github/prepare_site.sh

      - uses: actions/setup-python@v6
        with:
            python-version: '3.12' 
      
      - name: Generate contributors page 📝
        run: |
          python -m pip install requests
          python .github/contributors.py marmitesite/content/contributors.md

      - name: Build site 🏗️
        run: marmite marmitesite site -vvvv

      - name: Build site with alternative theme 🏗️
        run: |
          rm -rf marmitesite/content/_hero.md
          marmite marmitesite site/theme_template -vvvv --theme theme_template --url https://marmite.blog/theme_template

      - name: List files on site 📂
        run: ls -R site

      - name: Setup Pages 📄
        if: github.event_name == 'push' && steps.version.outputs.is_release == 'true'
        uses: actions/configure-pages@v6

      - name: Upload artifact 📦
        if: github.event_name == 'push' && steps.version.outputs.is_release == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: 'site'

      - name: Deploy to GitHub Pages 🚀
        if: github.event_name == 'push' && steps.version.outputs.is_release == 'true'
        id: deployment
        uses: actions/deploy-pages@v5

  coverage:
    name: coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Generate code coverage
        run: |
          cargo +nightly tarpaulin --verbose --all-features --workspace --timeout 120 --out xml

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v7
        with:
          token: ${{secrets.CODECOV_TOKEN}}
          fail_ci_if_error: false

  pedantic:
    name: Pedantic Clippy
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run pedantic clippy
        continue-on-error: true
        run: |
          cargo clippy -- -W clippy::pedantic 2>&1 | tee clippy_output.txt
          echo "CLIPPY_EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('clippy_output.txt', 'utf8');
            const marker = '<!-- pedantic-clippy -->';

            const warnings = output
              .split('\n')
              .filter(line => line.startsWith('warning:') && !line.includes('generated'));

            let body;
            if (warnings.length === 0) {
              body = `${marker}\n### Pedantic Clippy\n\nNo pedantic warnings found.`;
            } else {
              body = `${marker}\n### Pedantic Clippy\n\nFound **${warnings.length}** pedantic warning(s).\n\n<details>\n<summary>Show details</summary>\n\n\`\`\`\n${output}\n\`\`\`\n\n</details>`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  pr-coverage:
    name: PR Coverage
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: xd009642/tarpaulin:develop-nightly
      options: --security-opt seccomp=unconfined
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate code coverage
        continue-on-error: true
        run: |
          cargo +nightly tarpaulin --verbose --all-features --workspace --timeout 120 2>&1 | tee coverage_output.txt

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('coverage_output.txt', 'utf8');
            const marker = '<!-- pr-coverage -->';

            const coverageMatch = output.match(/(\d+\.\d+)% coverage/);
            const percentage = coverageMatch ? coverageMatch[1] : null;

            let body;
            if (percentage) {
              body = `${marker}\n### Code Coverage\n\nOverall coverage: **${percentage}%**\n\n<details>\n<summary>Show full report</summary>\n\n\`\`\`\n${output.slice(-10000)}\n\`\`\`\n\n</details>`;
            } else {
              body = `${marker}\n### Code Coverage\n\nCoverage report could not be generated.\n\n<details>\n<summary>Show output</summary>\n\n\`\`\`\n${output.slice(-10000)}\n\`\`\`\n\n</details>`;
            }

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
