# Marmite Configuration Reference
# Tip: Use the "Config" button in the toolbar for a visual editor.
# Or edit this file directly. Docs: https://marmite.blog/configuration-reference.html

# -- Site Identity --
name: Playground Site
tagline: Built with the Marmite Playground
# url: https://example.com
# footer: "Powered by <a href='https://marmite.blog'>Marmite</a>"
# language: en
# logo_image: media/logo.png

# -- Navigation Menu --
# Array of [label, url] pairs shown in the top nav.
menu:
  - ["Home", "/"]
  - ["About", "about.html"]
  - ["Tags", "tags.html"]
  - ["Archive", "archive.html"]

# -- Content Organization --
pagination: 10
